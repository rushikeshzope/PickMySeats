<div class="cropper-modal-backdrop">
  <div class="cropper-modal-card glass-card">
    <div class="modal-header">
      <h3 style="margin: 0;">Crop & Adjust Image</h3>
      <button class="close-btn" (click)="cancel()">✕</button>
    </div>

    <!-- The actual interactive canvas -->
    <div class="canvas-container">
      <canvas #cropperCanvas
              (mousedown)="onMouseDown($event)"
              (mousemove)="onMouseMove($event)"
              (mouseup)="onMouseUp()"
              (mouseleave)="onMouseUp()"
              (wheel)="onWheel($event)">
      </canvas>
      <div class="helper-text">🖱️ Scroll to zoom, drag to pan</div>
    </div>

    <!-- Controls Toolbar -->
    <div class="controls-toolbar">
      <div class="control-group">
        <button type="button" class="tool-btn" (click)="zoomOut()" title="Zoom Out">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button type="button" class="tool-btn" (click)="zoomIn()" title="Zoom In">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
      </div>

      <div class="control-group">
        <button type="button" class="tool-btn" (click)="rotateLeft()" title="Rotate Left 90°">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button type="button" class="tool-btn" (click)="rotateRight()" title="Rotate Right 90°">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
        </button>
      </div>
    </div>

    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      <button type="button" class="btn btn-primary" (click)="saveCrop()">Apply Crop</button>
    </div>
  </div>
</div>
